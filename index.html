<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car 焊接管理看板 V39 企业终版（保存+登录提示）</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;padding:20px;}
.header{text-align:center;font-size:30px;font-weight:bold;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #555;padding:8px;text-align:center;}
th{background:#1e293b;}
input{width:90%;background:#0f172a;color:white;border:none;text-align:center;}
button{padding:8px 15px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
#loginDiv{margin-bottom:20px;}
#saveBtn{background:#4caf50;color:white;}
.message{position:fixed;top:20px;right:20px;background:#4caf50;color:#fff;padding:10px 20px;border-radius:5px;z-index:1000;}
</style>
</head>
<body>

<div class="header">Smart Car 焊接管理看板 V39</div>

<div id="loginDiv">
    <input type="text" id="username" placeholder="用户名">
    <input type="password" id="password" placeholder="密码">
    <button id="loginBtn">登录</button>
</div>

<div id="controls" style="display:none;">
    <button id="addRowBtn">➕ 新增行</button>
    <button id="saveBtn">💾 保存</button>
</div>

<table id="dataTable">
    <thead>
        <tr>
            <th>项目</th>
            <th>工序</th>
            <th>周期</th>
            <th>责任部门</th>
            <th>作业人员</th>
            <th>上次时间</th>
            <th>下次时间</th>
            <th>状态</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
// ---- 模拟用户权限 ----
const users = [
    {username:'admin', password:'123', role:'admin'},
    {username:'guest', password:'guest', role:'guest'}
];
let currentUser = null;

// ---- 表格数据 ----
let tableData = [];

// ---- 登录功能 ----
document.getElementById("loginBtn").addEventListener("click", () => {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    const user = users.find(x => x.username===u && x.password===p);
    if(user){
        currentUser = user;
        localStorage.setItem("currentUser", JSON.stringify(user));
        document.getElementById("loginDiv").style.display='none';
        document.getElementById("controls").style.display='block';
        showMessage(`🎉 用户 ${user.username} 登录成功！`);
        renderTable();
    }else{
        showMessage('❌ 用户名或密码错误');
    }
});

// 登录保持
window.addEventListener('load', () => {
    const stored = JSON.parse(localStorage.getItem("currentUser"));
    if(stored){
        currentUser = stored;
        document.getElementById("loginDiv").style.display='none';
        document.getElementById("controls").style.display='block';
        renderTable();
    }
});

// ---- 表格渲染 ----
function renderTable(){
    const tbody = document.getElementById("dataTable").querySelector("tbody");
    tbody.innerHTML='';
    tableData.forEach((row, index)=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><input value="${row.project||''}" ${currentUser.role==='guest'?'readonly':''}></td>
            <td><input value="${row.process||''}" ${currentUser.role==='guest'?'readonly':''}></td>
            <td><input value="${row.cycle||''}" ${currentUser.role==='guest'?'readonly':''}></td>
            <td><input value="${row.department||''}" ${currentUser.role==='guest'?'readonly':''}></td>
            <td><input value="${row.operator||''}" ${currentUser.role==='guest'?'readonly':''}></td>
            <td><input value="${row.lastTime||''}" ${currentUser.role==='guest'?'readonly':''} class="lastTime"></td>
            <td>${row.nextTime||''}</td>
            <td>${row.status||''}</td>
        `;
        // 上次时间修改监听
        tr.querySelector(".lastTime")?.addEventListener("change", (e)=>{
            row.lastTime = e.target.value;
            row.nextTime = calculateNextTime(row.lastTime,row.cycle);
            row.status = calculateStatus(row.lastTime,row.cycle);
            renderTable();
        });
        tbody.appendChild(tr);
    });
}

// ---- 新增行 ----
document.getElementById("addRowBtn").addEventListener("click", ()=>{
    if(!currentUser) return;
    const newRow = {project:'', process:'', cycle:'', department:'', operator:'', lastTime:'', nextTime:'', status:''};
    tableData.push(newRow);
    renderTable();
});

// ---- 保存按钮 ----
document.getElementById("saveBtn").addEventListener("click", async ()=>{
    tableData.forEach(row=>{
        row.nextTime = calculateNextTime(row.lastTime,row.cycle);
        row.status = calculateStatus(row.lastTime,row.cycle);
    });
    try{
        await updateGoogleSheet(tableData);
        showMessage("✅ 保存成功！");
        renderTable();
    }catch(err){
        console.error(err);
        showMessage("❌ 保存失败：" + err.message);
    }
});

// ---- 下次时间计算 ----
function calculateNextTime(lastTime, cycle){
    if(!lastTime || !cycle) return '';
    const date = new Date(lastTime);
    const num = parseInt(cycle);
    if(isNaN(date.getTime()) || isNaN(num)) return '';
    // 假设周期单位是天
    date.setDate(date.getDate()+num);
    return date.toISOString().slice(0,10);
}

// ---- 状态计算 ----
function calculateStatus(lastTime, cycle){
    if(!lastTime || !cycle) return '';
    const next = new Date(calculateNextTime(lastTime, cycle));
    const today = new Date();
    if(next<today) return '⚠️ 逾期';
    const diff = Math.ceil((next-today)/1000/3600/24);
    if(diff<=3) return '🟡 即将';
    return '✅ 正常';
}

// ---- Google Sheets 写入 ----
async function updateGoogleSheet(data){
    // 这里需要你的 Google Apps Script Web App URL
    const url = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';
    const res = await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
    });
    if(!res.ok) throw new Error('Google Sheets 更新失败');
}

// ---- 消息提示 ----
function showMessage(msg){
    const div = document.createElement("div");
    div.className='message';
    div.innerText=msg;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),3000);
}
</script>
</body>
</html>
