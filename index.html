<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car V40 看板（PC端）</title>
<style>
  body { font-family: Arial; background: #0f172a; color: white; margin: 0; padding: 20px; }
  h1,h2 { margin: 10px 0; color: #f0f0f0; }
  input, button { padding: 5px 10px; margin: 5px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; background: #1e293b; color: white; }
  th, td { border: 1px solid #334155; padding: 8px; text-align: center; }
  th { background: #334155; }
  .hidden { display: none; }
  #loginSection, #actionSection { margin-bottom: 20px; }
  tr.selected { background: #0ea5e9; }
</style>
</head>
<body>

<h1>Smart Car V40 PC端看板</h1>

<div id="loginSection">
  <h2>登录</h2>
  <input id="username" placeholder="用户名">
  <input id="password" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <p id="loginResult"></p>
</div>

<div id="actionSection" class="hidden">
  <h2>操作</h2>
  <button onclick="addRow()">新增行</button>
  <button onclick="updateRow()">更新选中行</button>
  <button onclick="deleteRow()">删除选中行</button>
  <p id="actionResult"></p>
</div>

<h2>Sheet 数据</h2>
<table id="dataTable">
  <thead>
    <tr id="tableHeader"></tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"; // 替换为你的 Apps Script URL
let sheetData = [];
let selectedRowIndex = null;
let role = null;

// -------------------- 登录 --------------------
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();
    if (data.success) {
      role = data.role;
      localStorage.setItem('role', role);
      document.getElementById('loginResult').textContent = `登录成功，角色: ${role}`;
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('actionSection').classList.remove('hidden');
      fetchSheetData();
    } else {
      document.getElementById('loginResult').textContent = `登录失败: ${data.error}`;
    }
  } catch (err) {
    document.getElementById('loginResult').textContent = `网络错误: ${err.message}`;
  }
}

// -------------------- 获取表格数据 --------------------
async function fetchSheetData() {
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get', sheet: 'Sheet1' })
    });
    const data = await res.json();
    if (data.success) {
      sheetData = data.values;
      renderTable();
    } else {
      document.getElementById('actionResult').textContent = `获取数据失败: ${data.error}`;
    }
  } catch (err) {
    document.getElementById('actionResult').textContent = `网络错误: ${err.message}`;
  }
}

// -------------------- 渲染表格 --------------------
function renderTable() {
  const tableHeader = document.getElementById('tableHeader');
  const tableBody = document.getElementById('tableBody');
  tableHeader.innerHTML = '';
  tableBody.innerHTML = '';

  if (!sheetData.length) return;

  // 表头
  sheetData[0].forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    tableHeader.appendChild(th);
  });

  // 表体
  for (let i = 1; i < sheetData.length; i++) {
    const row = sheetData[i];
    const tr = document.createElement('tr');
    tr.dataset.index = i;
    tr.onclick = () => selectRow(i);
    row.forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.appendChild(td);
    });
    tableBody.appendChild(tr);
  }
}

// -------------------- 选中行 --------------------
function selectRow(index) {
  selectedRowIndex = index;
  Array.from(document.querySelectorAll('#tableBody tr')).forEach(tr => {
    tr.classList.toggle('selected', tr.dataset.index == index);
  });
}

// -------------------- 新增行 --------------------
async function addRow() {
  if (!role) return alert('请先登录');
  const values = prompt("输入新增行数据，用逗号分隔").split(",");
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'add', sheet: 'Sheet1', values })
    });
    const data = await res.json();
    if (data.success) {
      fetchSheetData();
      document.getElementById('actionResult').textContent = '新增成功';
    } else {
      document.getElementById('actionResult').textContent = `新增失败: ${data.error}`;
    }
  } catch (err) {
    document.getElementById('actionResult').textContent = `网络错误: ${err.message}`;
  }
}

// -------------------- 更新行 --------------------
async function updateRow() {
  if (!role) return alert('请先登录');
  if (selectedRowIndex === null) return alert('请选择要更新的行');
  const values = prompt("输入更新行数据，用逗号分隔").split(",");
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', sheet: 'Sheet1', id: sheetData[selectedRowIndex][9], values })
    });
    const data = await res.json();
    if (data.success) {
      fetchSheetData();
      document.getElementById('actionResult').textContent = '更新成功';
    } else {
      document.getElementById('actionResult').textContent = `更新失败: ${data.error}`;
    }
  } catch (err) {
    document.getElementById('actionResult').textContent = `网络错误: ${err.message}`;
  }
}

// -------------------- 删除行 --------------------
async function deleteRow() {
  if (!role) return alert('请先登录');
  if (selectedRowIndex === null) return alert('请选择要删除的行');
  if (!confirm('确认删除选中行吗？')) return;
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', sheet: 'Sheet1', id: sheetData[selectedRowIndex][9] })
    });
    const data = await res.json();
    if (data.success) {
      fetchSheetData();
      document.getElementById('actionResult').textContent = '删除成功';
      selectedRowIndex = null;
    } else {
      document.getElementById('actionResult').textContent = `删除失败: ${data.error}`;
    }
  } catch (err) {
    document.getElementById('actionResult').textContent = `网络错误: ${err.message}`;
  }
}

// -------------------- 自动登录 --------------------
window.onload = () => {
  const savedRole = localStorage.getItem('role');
  if (savedRole) {
    role = savedRole;
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('actionSection').classList.remove('hidden');
    fetchSheetData();
  }
}
</script>
</body>
</html>
