<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>设备管理系统 / Equipment Management System</title>

<style>
body{
    font-family:Arial;
    margin:20px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}
th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}
input,select{
    width:100%;
}
button{
    padding:6px 12px;
}
</style>
</head>
<body>

<h2>维护表 / Maintenance</h2>
<table id="maintainTable">
<thead>
<tr>
<th>项目</th>
<th>工序</th>
<th>责任人</th>
<th>周期</th>
<th>单位</th>
<th>上次时间</th>
<th>下次时间</th>
<th>状态</th>
<th>备注</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>检查表 / Inspection</h2>
<table id="inspectTable">
<thead>
<tr>
<th>项目</th>
<th>工序</th>
<th>责任人</th>
<th>周期</th>
<th>单位</th>
<th>上次时间</th>
<th>下次时间</th>
<th>状态</th>
<th>备注</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// ---------- Google Sheet 配置 ----------
const sheetID = "1tPygLGl2Y4q6ykqxDsIuAD7ACkhTZMxbnTxyv-Dv-XY";

const sheetConfigs = [
    { name: "Maintenance", tableId: "maintainTable" },
    { name: "Inspection", tableId: "inspectTable" }
];

// ---------- 日期处理 ----------
function formatDateForInput(value){
    if(!value) return '';

    if(typeof value === 'string' && value.includes('T')){
        return value.split('T')[0];
    }

    if(typeof value === 'number'){
        const date = new Date((value - 25569) * 86400 * 1000);
        const y = date.getFullYear();
        const m = ('0'+(date.getMonth()+1)).slice(-2);
        const d = ('0'+date.getDate()).slice(-2);
        return `${y}-${m}-${d}`;
    }

    return value;
}

// ---------- 状态计算 ----------
function calculateNext(input){
    const row = input.closest('tr');

    const cycle = parseInt(row.cells[3].querySelector('input').value)||0;
    const unit = row.cells[4].querySelector('select').value;
    const lastDate = new Date(row.cells[5].querySelector('input').value);

    if(!lastDate.getTime()) return;

    let next = new Date(lastDate);

    if(unit.includes('月')) next.setMonth(next.getMonth()+cycle);
    if(unit.includes('周')) next.setDate(next.getDate()+cycle*7);
    if(unit.includes('天')) next.setDate(next.getDate()+cycle);

    row.cells[6].querySelector('input').value = next.toISOString().split('T')[0];

    const today = new Date();
    const diff = (next - today)/(1000*3600*24);

    let status='正常';

    if(diff<0) status='超期';
    else if(diff<3) status='即将到期';

    row.cells[7].textContent=status;
}

// ---------- 行监听 ----------
function addRowListeners(){
    document.querySelectorAll('tbody tr').forEach(row=>{

        const cycleInput=row.cells[3]?.querySelector('input');
        const unitSelect=row.cells[4]?.querySelector('select');
        const lastDate=row.cells[5]?.querySelector('input');

        if(cycleInput) cycleInput.oninput=()=>calculateNext(cycleInput);
        if(unitSelect) unitSelect.onchange=()=>calculateNext(unitSelect);
        if(lastDate) lastDate.onchange=()=>calculateNext(lastDate);

    });
}

// ---------- 删除 ----------
function deleteRow(btn){
    btn.closest('tr').remove();
}

// ---------- 渲染表格 ----------
function renderSheetData(rows, tableId){

    const table=document.getElementById(tableId).tBodies[0];
    table.innerHTML='';

    rows.forEach(rowData=>{

        const tr=table.insertRow();

        for(let j=0;j<10;j++){

            const td=tr.insertCell();
            const cell=rowData[j]||'';

            if(j===3){
                td.innerHTML=`<input type='number' value='${cell}'>`;
            }

            else if(j===4){
                td.innerHTML=`
                <select>
                    <option>月 / Month</option>
                    <option>周 / Week</option>
                    <option>天 / Day</option>
                </select>`;
                td.querySelector('select').value=cell||'月 / Month';
            }

            else if(j===5 || j===6){
                td.innerHTML=`<input type='date' value='${formatDateForInput(cell)}'>`;
            }

            else if(j===9){
                td.innerHTML=`<button onclick='deleteRow(this)'>删除 / Delete</button>`;
            }

            else{
                td.textContent=cell;
            }
        }

        addRowListeners();

        if(tr.cells[5]?.querySelector('input')){
            calculateNext(tr.cells[5].querySelector('input'));
        }

    });
}

// ---------- 单个 Sheet ----------
async function fetchSingleSheet(sheetName, tableId){

    try{

        const url=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;

        const res=await fetch(url);
        const text=await res.text();

        const jsonText=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1];
        const json=JSON.parse(jsonText);

        const rows=json.table.rows.map(r=>
            r.c.map(cell=>cell?cell.v:'')
        );

        renderSheetData(rows,tableId);

    }catch(err){
        console.error(`读取 ${sheetName} 出错:`,err);
    }

}

// ---------- 全部读取 ----------
async function fetchSheetData(){

    for(const config of sheetConfigs){
        await fetchSingleSheet(config.name, config.tableId);
    }

}

// ---------- 页面加载 ----------
fetchSheetData();

</script>

</body>
</html>
