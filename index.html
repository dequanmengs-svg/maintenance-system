<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car 焊接管理看板 V41 企业稳定版</title>
<style>
  :root {
    --bg-deep: #0f172a;
    --bg-panel: #1e293b;
    --bg-header: #334155;
    --border: #334155;
    --accent: #38bdf8;
    --input-bg: #0f172a;
    --text: #f1f5f9;
    --normal: #16a34a;
    --warning: #eab308;
    --danger: #dc2626;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { margin:0; font-family:Arial,sans-serif; background:var(--bg-deep); color:var(--text); padding:20px; }
  .header { text-align:center; font-size:30px; font-weight:bold; margin-bottom:20px; }
  .login-box { margin-bottom:20px; text-align:center; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:8px; }
  .login-box label { font-size:14px; }
  .container { display:flex; gap:20px; flex-wrap:wrap; }
  .panel { flex:1; background:var(--bg-panel); border-radius:12px; padding:20px; min-width:300px; overflow:auto; }
  table { width:100%; border-collapse:collapse; font-size:14px; table-layout:fixed; }
  th, td { border:1px solid var(--border); padding:8px; text-align:center; word-break:break-word; }
  th { background:var(--bg-header); }
  input, select { width:100%; background:var(--input-bg); color:var(--text); border:1px solid #475569; padding:4px; border-radius:4px; }
  td[contenteditable="true"]:focus { outline:2px solid var(--accent); background:#1e3a5f; }
  .normal  { background: var(--normal);  color:white; }
  .warning { background: var(--warning); color:black; }
  .danger  { background: var(--danger);  color:white; }
  button { padding:6px 12px; background:var(--accent); color:#0f172a; border:none; border-radius:8px; cursor:pointer; font-weight:bold; transition:opacity 0.2s; }
  button:hover:not(:disabled) { opacity:0.8; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  #exitFullScreenBtn { position:fixed; top:10px; right:10px; z-index:1000; padding:5px 10px; background:var(--danger); color:white; border:none; border-radius:6px; display:none; cursor:pointer; }
  .toast { position:fixed; bottom:20px; right:20px; background:rgba(0,0,0,0.75); color:white; padding:10px 20px; border-radius:8px; z-index:2000; font-size:14px; animation:fadeInOut 2.2s ease forwards; }
  @keyframes fadeInOut { 0%{opacity:0; transform:translateY(10px);} 15%{opacity:1; transform:translateY(0);} 75%{opacity:1;} 100%{opacity:0;} }
  .saving::after { content:' ⏳'; }
</style>
</head>
<body>

<div class="header">Smart Car 焊接管理看板</div>

<div class="login-box" id="loginBox">
  <label for="username">账号:</label>
  <input id="username" style="width:120px" autocomplete="username">
  <label for="password">密码:</label>
  <input id="password" type="password" style="width:120px" autocomplete="current-password">
  <button type="button" onclick="login()">登录</button>
  <span id="roleText" style="font-size:13px;color:#94a3b8;">未登录</span>
  <button type="button" onclick="logout()" id="logoutBtn" style="background:#475569;display:none;">登出</button>
  <button type="button" onclick="exportData()" id="exportBtn" disabled>导出备份</button>
  <label style="cursor:pointer;">
    <input type="file" accept=".json" onchange="importData(event)" id="importFile" style="display:none" disabled>
    <span id="importLabel" style="padding:6px 12px;background:#475569;border-radius:8px;font-size:14px;opacity:0.4;cursor:not-allowed;">导入备份</span>
  </label>
  <button type="button" onclick="toggleFullScreen()">大屏模式</button>
</div>

<button id="exitFullScreenBtn" onclick="toggleFullScreen()">✕ 退出大屏</button>

<div class="container">
  <div class="panel">
    <h2 style="margin-top:0;">🔧 Maintenance</h2>
    <table id="maintainTable">
      <thead>
        <tr>
          <th>项目</th><th>工序</th><th>责任人</th><th>周期值</th><th>周期单位</th>
          <th>上次时间</th><th>下次时间</th><th>备注</th><th>状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button type="button" onclick="addRow('maintainTable')" id="addMaintainBtn" style="margin-top:10px;" disabled>＋ 新增一行</button>
  </div>

  <div class="panel">
    <h2 style="margin-top:0;">🔍 Inspection</h2>
    <table id="inspectTable">
      <thead>
        <tr>
          <th>项目</th><th>工序</th><th>责任人</th><th>周期值</th><th>周期单位</th>
          <th>上次时间</th><th>下次时间</th><th>备注</th><th>状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button type="button" onclick="addRow('inspectTable')" id="addInspectBtn" style="margin-top:10px;" disabled>＋ 新增一行</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMZNe2iKWLew9Y36P30R6yP3yPKgbeciCYFsxQY6nXsaWiLG0NWDxgGDY00x20Loxdpg/exec'; // 替换为你的 Apps Script 部署 URL
const SHEET_ID = '1tPygLGl2Y4q6ykqxDsIuAD7ACkhTZMxbnTxyv-Dv-XY';
const SHEET_MAP = { maintainTable: 'Maintenance', inspectTable: 'Inspection' };
const COL_COUNT = 10;
let currentRole = null;

// ────────── 工具函数 ──────────
function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function debounce(fn,delay=600){ let t; return function(...a){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,a),delay); }; }
function generateUUID(){ return (typeof crypto!=='undefined'&&crypto.randomUUID)? crypto.randomUUID(): 'id-'+Date.now().toString(36)+Math.random().toString(36).substr(2,9); }
function formatDateForInput(v){ if(!v) return ''; const d=new Date(v); if(isNaN(d.getTime())) return ''; d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ────────── 后端请求 ──────────
async function sendToSheet(action,sheet,id,values){
  try{
    const body={action,sheet,id,values};

    const res=await fetch(SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify(body)
    });

    return await res.json();

  }catch(e){
    console.error('请求失败',e);
    return {success:false,error:'网络错误'};
  }
}
// ────────── 登录登出 ──────────
async function login(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value.trim();
  if(!u||!p){ showToast('请输入账号和密码'); return; }
  const result=await sendToSheet('login',null,null,{username:u,password:p});
  if(result.success){ currentRole=result.role; document.getElementById('roleText').innerText=`已登录: ${currentRole}`; document.getElementById('logoutBtn').style.display='inline-block'; applyPermission(); fetchSheetData(); showToast(`登录成功 ✔ (${currentRole})`); }
  else showToast('登录失败 ❌ '+(result.error||'未知错误'));
}
function logout(){ currentRole=null; sessionStorage.removeItem('currentRole'); document.getElementById('roleText').innerText='未登录'; document.getElementById('logoutBtn').style.display='none'; document.querySelectorAll('tbody').forEach(tb=>tb.innerHTML=''); applyPermission(); showToast('已登出'); }

// ────────── 权限应用 ──────────
function applyPermission(){
  const isAdmin=currentRole==='admin';
  document.getElementById('exportBtn').disabled=!isAdmin;
  document.getElementById('importFile').disabled=!isAdmin;
  document.getElementById('addMaintainBtn').disabled=!isAdmin;
  document.getElementById('addInspectBtn').disabled=!isAdmin;
  const importLabel=document.getElementById('importLabel'); importLabel.style.opacity=isAdmin?'1':'0.4'; importLabel.style.cursor=isAdmin?'pointer':'not-allowed'; importLabel.style.background=isAdmin?'#38bdf8':'#475569';
  document.querySelectorAll('tbody tr').forEach(tr=>applyRowPermission(tr));
}
function applyRowPermission(tr){
  const isAdmin=currentRole==='admin';
  for(let i=0;i<tr.cells.length-1;i++){
    const cell=tr.cells[i]; const inp=cell.querySelector('input,select');
    if(inp) inp.disabled=!isAdmin; else cell.contentEditable=(isAdmin && i<8).toString();
  }
  const btn=tr.cells[tr.cells.length-1]?.querySelector('button'); if(btn) btn.disabled=!isAdmin;
}

// ────────── 数据渲染 ──────────
async function fetchSheetData(){ for(const [tableId,sheetName] of Object.entries(SHEET_MAP)) await fetchSingleSheet(sheetName,tableId); }
async function fetchSingleSheet(sheetName,tableId){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;
    const txt=await (await fetch(url)).text();
    const match=txt.match(/setResponse\(([\s\S]*)\)/); if(!match) throw new Error('无法解析 Google Sheet 响应');
    const json=JSON.parse(match[1]); const rows=json.table.rows.map(r=>r.c.map(c=>c?{v:c.v}: {v:''}));
    renderSheetData(rows,tableId);
  } catch(e){ console.warn(`Sheet "${sheetName}" 拉取失败：`,e); }
}
function renderSheetData(rows,tableId){ const tb=document.getElementById(tableId).tBodies[0]; tb.innerHTML=''; rows.forEach(r=>insertRow(tb,r)); applyPermission(); }

// ────────── 行操作 ──────────
function insertRow(tb,r=[]){
  const tr=tb.insertRow(); const rowId=r[9]?.v||generateUUID(); tr.dataset.id=rowId;
  for(let i=0;i<COL_COUNT;i++){
    const td=tr.insertCell(); const val=r[i]?.v||'';
    if(i===3) td.innerHTML=`<input type="number" min="1" value="${val||1}">`;
    else if(i===4){ td.innerHTML=`<select><option>月 / Month</option><option>周 / Week</option><option>天 / Day</option></select>`; td.querySelector('select').value=val||'月 / Month'; }
    else if(i===5||i===6) td.innerHTML=`<input type="date" value="${formatDateForInput(val)}">`;
    else if(i===8) td.textContent='';
    else if(i===9) td.innerHTML=`<button type="button" onclick="deleteRow(this)">删除</button>`;
    else td.contentEditable='true'; td.textContent=val;
  }
  bindRowEvents(tr); applyRowPermission(tr); return tr;
}
function bindRowEvents(tr){ const debouncedSave=debounce(()=>{ if(currentRole==='admin') saveRowToSheet(tr); },600); tr.querySelectorAll('input,select').forEach(el=>{ el.addEventListener('input',()=>debouncedSave()); el.addEventListener('change',()=>debouncedSave()); }); for(let i=0;i<COL_COUNT;i++){ const cell=tr.cells[i]; if(cell && !cell.querySelector('input,select,button')) cell.addEventListener('blur',()=>{ if(currentRole==='admin') saveRowToSheet(tr); }); } }

async function saveRowToSheet(tr){
  const tableId=tr.closest('table').id;
  const values=[]; for(let i=0;i<COL_COUNT-2;i++){ const cell=tr.cells[i]; const input=cell.querySelector('input,select'); values.push(input?input.value:cell.textContent.trim()); }
  values.push(tr.cells[8].textContent.trim()); values.push(tr.dataset.id);
  const result=await sendToSheet('update',SHEET_MAP[tableId],tr.dataset.id,values);
  if(result.success) showToast('保存成功 ✔'); else showToast('保存失败 ❌ '+(result.error||'未知错误'));
}
async function addRow(tableId){
  if(currentRole!=='admin'){ alert('仅 admin 可操作'); return; }
  const tb=document.getElementById(tableId).tBodies[0]; const newId=generateUUID();
  const emptyData=Array.from({length:9},()=>({v:''})).concat([{v:newId}]); const tr=insertRow(tb,emptyData);
  const values=Array.from({length:8},(_,i)=>{ const cell=tr.cells[i]; const input=cell.querySelector('input,select'); return input?input.value:cell.textContent.trim(); }).concat(['',newId]);
  const result=await sendToSheet('add',SHEET_MAP[tableId],newId,values);
  if(result.success) showToast('新增行成功 ✔'); else showToast('新增行失败 ❌ '+(result.error||'未知错误'));
}
async function deleteRow(btn){
  if(currentRole!=='admin'){ alert('仅 admin 可操作'); return; }
  const tr=btn.closest('tr'); const tableId=tr.closest('table').id;
  const result=await sendToSheet('delete',SHEET_MAP[tableId],tr.dataset.id);
  if(result.success){ tr.remove(); showToast('删除成功 ✔'); } else showToast('删除失败 ❌ '+(result.error||'未知错误'));
}

// ────────── TODO: 导入导出 & 全屏功能等，可继续扩展 ──────────
</script>

</body>
</html>
