<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car 焊接管理看板 V42</title>
<style>
:root{
--bg:#0f172a;
--panel:#1e293b;
--header:#334155;
--border:#475569;
--accent:#38bdf8;
--text:#f1f5f9;
}
body{
margin:0;
padding:20px;
font-family:Arial;
background:var(--bg);
color:var(--text);
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.logo{
height:50px;
}
.header{
font-size:28px;
font-weight:bold;
}
.login-box{
display:flex;
gap:8px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}
.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}
.panel{
flex:1;
min-width:48%;
background:var(--panel);
padding:20px;
border-radius:12px;
overflow:auto;
}
table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}
th,td{
border:1px solid var(--border);
padding:8px;
text-align:center;
word-break:break-word;
}
th{
background:var(--header);
}
input,select,button{
padding:6px;
border:none;
border-radius:6px;
}
button{
background:var(--accent);
cursor:pointer;
font-weight:bold;
}
button:disabled{
opacity:0.4;
cursor:not-allowed;
}
.normal{background:#16a34a;}
.warning{background:#eab308;color:black;}
.danger{background:#dc2626;}
.toast{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:10px 20px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="topbar">
<img class="logo" src="你的logo地址">
<div class="header">Smart Car 焊接管理看板</div>
<button onclick="toggleLogin()">隐藏登录</button>
</div>

<div class="login-box" id="loginBox">
<input id="username" placeholder="账号">
<input id="password" type="password" placeholder="密码">
<button id="loginBtn">登录</button>
<span id="roleText">未登录</span>
<button id="logoutBtn" style="display:none;">登出</button>
<button id="exportBtn">导出</button>
<input type="file" id="importFile">
</div>

<div class="container">
<div class="panel">
<h2>Maintenance</h2>
<table id="maintainTable">
<thead>
<tr>
<th>项目</th><th>工序</th><th>责任人</th><th>周期值</th><th>单位</th>
<th>上次时间</th><th>下次时间</th><th>备注</th><th>状态</th><th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>
<button id="addMaintainBtn">新增</button>
</div>

<div class="panel">
<h2>Inspection</h2>
<table id="inspectTable">
<thead>
<tr>
<th>项目</th><th>工序</th><th>责任人</th><th>周期值</th><th>单位</th>
<th>上次时间</th><th>下次时间</th><th>备注</th><th>状态</th><th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>
<button id="addInspectBtn">新增</button>
</div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzj1Xvtof3AqoB6K2YYZJWSaTuvK3jgiRLs3lKdFGGP3ZhUvVdlltRg26a9fv4Au7Exbg/exec';

const SHEET_MAP={
maintainTable:'Maintenance',
inspectTable:'Inspection'
};

let currentRole=sessionStorage.getItem('currentRole')||null;

function toggleLogin(){
loginBox.style.display=loginBox.style.display==='none'?'flex':'none';
}

function showToast(msg){
const t=document.createElement('div');
t.className='toast';
t.textContent=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function generateUUID(){
return 'id-'+Date.now().toString(36)+Math.random().toString(36).substr(2,9);
}

async function sendToSheet(action,sheet,id,values){
const res=await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain;charset=utf-8'},
body:JSON.stringify({action,sheet,id,values})
});
return JSON.parse(await res.text());
}

function applyPermission(){
const isAdmin=currentRole==='admin';

document.querySelectorAll('[contenteditable]').forEach(td=>{
td.contentEditable=isAdmin;
});

document.querySelectorAll('.del').forEach(btn=>{
btn.disabled=!isAdmin;
});

addMaintainBtn.disabled=!isAdmin;
addInspectBtn.disabled=!isAdmin;
}

function calcNextDate(value,unit,lastDate){
if(!value||!unit||!lastDate)return '';
let d=new Date(lastDate);

if(unit==='天') d.setDate(d.getDate()+Number(value));
if(unit==='周') d.setDate(d.getDate()+Number(value)*7);
if(unit==='月') d.setMonth(d.getMonth()+Number(value));

return d.toISOString().split('T')[0];
}

function calcStatus(next){
if(!next)return '';
const today=new Date();
const d=new Date(next);
const diff=(d-today)/(1000*3600*24);

if(diff<0) return '超期';
if(diff<=3) return '警告';
return '正常';
}

function createRow(tableId,row=[]){
const tbody=document.querySelector(`#${tableId} tbody`);
const tr=document.createElement('tr');
const id=row[9]||generateUUID();

for(let i=0;i<9;i++){
const td=document.createElement('td');

if(i===4){
td.innerHTML=`<select>
<option>天</option>
<option>周</option>
<option>月</option>
</select>`;
if(row[i]) td.firstChild.value=row[i];
}
else if(i===5){
td.innerHTML=`<input type="date" value="${row[i]||''}">`;
}
else{
td.contentEditable=currentRole==='admin';
td.innerText=row[i]||'';
}

tr.appendChild(td);
}

const btn=document.createElement('button');
btn.textContent='删除';
btn.className='del';
btn.onclick=()=>deleteRow(tr,tableId,id);

const td=document.createElement('td');
td.appendChild(btn);
tr.appendChild(td);

tr.onchange=()=>updateLinked(tr,tableId,id);

tbody.appendChild(tr);
applyPermission();
}

function updateLinked(tr,tableId,id){
const tds=tr.children;

const cycle=tds[3].innerText;
const unit=tds[4].querySelector('select').value;
const last=tds[5].querySelector('input').value;

const next=calcNextDate(cycle,unit,last);
tds[6].innerText=next;

const status=calcStatus(next);
tds[8].innerText=status;

tds[8].className=status==='正常'?'normal':status==='警告'?'warning':'danger';

saveRow(tr,tableId,id);
}

async function saveRow(tr,tableId,id){
const tds=tr.children;
const values=[
tds[0].innerText,
tds[1].innerText,
tds[2].innerText,
tds[3].innerText,
tds[4].querySelector('select').value,
tds[5].querySelector('input').value,
tds[6].innerText,
tds[7].innerText,
tds[8].innerText,
id
];

await sendToSheet('save',SHEET_MAP[tableId],id,values);
}

async function deleteRow(tr,tableId,id){
await sendToSheet('delete',SHEET_MAP[tableId],id);
tr.remove();
}

async function loadTable(tableId){
const result=await sendToSheet('load',SHEET_MAP[tableId]);
document.querySelector(`#${tableId} tbody`).innerHTML='';
result.data.slice(1).forEach(r=>createRow(tableId,r));
}

function loadAll(){
loadTable('maintainTable');
loadTable('inspectTable');
}

loginBtn.onclick=()=>{
if(username.value==='admin'&&password.value==='123456'){
currentRole='admin';
sessionStorage.setItem('currentRole','admin');
roleText.innerText='admin';
logoutBtn.style.display='inline-block';
applyPermission();
}
};

logoutBtn.onclick=()=>{
currentRole=null;
sessionStorage.removeItem('currentRole');
roleText.innerText='未登录';
logoutBtn.style.display='none';
applyPermission();
};

addMaintainBtn.onclick=()=>createRow('maintainTable',['','','','','天','','','','',generateUUID()]);
addInspectBtn.onclick=()=>createRow('inspectTable',['','','','','天','','','','',generateUUID()]);

exportBtn.onclick=()=>{
const data={
maintain:[...maintainTable.querySelectorAll('tbody tr')].map(r=>[...r.children].map(td=>td.innerText)),
inspect:[...inspectTable.querySelectorAll('tbody tr')].map(r=>[...r.children].map(td=>td.innerText))
};
const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='backup.json';
a.click();
};

window.onload=loadAll;
</script>

</body>
</html>
