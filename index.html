<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car 焊接管理看板 V41 最终稳定版</title>
<style>
:root{
--bg:#0f172a;
--panel:#1e293b;
--header:#334155;
--border:#475569;
--accent:#38bdf8;
--text:#f1f5f9;
}
body{
margin:0;
padding:20px;
font-family:Arial;
background:var(--bg);
color:var(--text);
}
.header{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:20px;
}
.login-box{
display:flex;
gap:8px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}
.panel{
background:var(--panel);
padding:20px;
border-radius:12px;
margin-bottom:20px;
overflow:auto;
}
table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}
th,td{
border:1px solid var(--border);
padding:8px;
text-align:center;
word-break:break-word;
}
th{
background:var(--header);
}
input,button{
padding:6px;
border:none;
border-radius:6px;
}
button{
background:var(--accent);
cursor:pointer;
font-weight:bold;
}
button:disabled{
opacity:0.4;
cursor:not-allowed;
}
td[contenteditable="true"]{
background:#0f172a;
}
.toast{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:10px 20px;
border-radius:8px;
z-index:999;
}
</style>
</head>
<body>

<div class="header">Smart Car 焊接管理看板</div>

<div class="login-box">
<input id="username" placeholder="账号">
<input id="password" type="password" placeholder="密码">
<button id="loginBtn">登录</button>
<span id="roleText">未登录</span>
<button id="logoutBtn" style="display:none;">登出</button>
</div>

<div class="panel">
<h2>🔧 Maintenance</h2>
<table id="maintainTable">
<thead>
<tr>
<th>项目</th>
<th>工序</th>
<th>责任人</th>
<th>周期值</th>
<th>周期单位</th>
<th>上次时间</th>
<th>下次时间</th>
<th>备注</th>
<th>状态</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>
<button id="addMaintainBtn" disabled>＋ 新增一行</button>
</div>

<div class="panel">
<h2>🔍 Inspection</h2>
<table id="inspectTable">
<thead>
<tr>
<th>项目</th>
<th>工序</th>
<th>责任人</th>
<th>周期值</th>
<th>周期单位</th>
<th>上次时间</th>
<th>下次时间</th>
<th>备注</th>
<th>状态</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>
<button id="addInspectBtn" disabled>＋ 新增一行</button>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzj1Xvtof3AqoB6K2YYZJWSaTuvK3jgiRLs3lKdFGGP3ZhUvVdlltRg26a9fv4Au7Exbg/exec';

const SHEET_MAP={
maintainTable:'Maintenance',
inspectTable:'Inspection'
};

let currentRole=sessionStorage.getItem('currentRole')||null;

function showToast(msg){
const t=document.createElement('div');
t.className='toast';
t.textContent=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function generateUUID(){
return 'id-'+Date.now().toString(36)+Math.random().toString(36).substr(2,9);
}

async function sendToSheet(action,sheet,id,values){
try{
const body={action,sheet};
if(id) body.id=id;
if(values) body.values=values;

const res=await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain;charset=utf-8'},
body:JSON.stringify(body)
});

const text=await res.text();
return JSON.parse(text);

}catch(e){
console.error(e);
return {success:false};
}
}

async function login(){
const u=username.value.trim();
const p=password.value.trim();

if(u==='admin'&&p==='123456'){
currentRole='admin';
sessionStorage.setItem('currentRole','admin');
}
else if(u==='guest'&&p==='guest'){
currentRole='guest';
sessionStorage.setItem('currentRole','guest');
}
else{
showToast('登录失败');
return;
}

roleText.innerText='已登录:'+currentRole;
logoutBtn.style.display='inline-block';

applyPermission();
loadAllData();
showToast('登录成功');
}

function logout(){
currentRole=null;
sessionStorage.removeItem('currentRole');
roleText.innerText='未登录';
logoutBtn.style.display='none';
applyPermission();
}

function applyPermission(){
const isAdmin=currentRole==='admin';

addMaintainBtn.disabled=!isAdmin;
addInspectBtn.disabled=!isAdmin;

document.querySelectorAll('td').forEach(td=>{
td.contentEditable=isAdmin;
});

document.querySelectorAll('button.del').forEach(btn=>{
btn.disabled=!isAdmin;
});
}

async function loadAllData(){
await loadTable('maintainTable');
await loadTable('inspectTable');
applyPermission();
}

async function loadTable(tableId){
const result=await sendToSheet('load',SHEET_MAP[tableId]);

if(!result.success||!result.data)return;

const tbody=document.querySelector(`#${tableId} tbody`);
tbody.innerHTML='';

result.data.slice(1).forEach(row=>{
createRow(tableId,row);
});
}

function createRow(tableId,row=[]){
const tbody=document.querySelector(`#${tableId} tbody`);
const tr=document.createElement('tr');
const id=row[9]||generateUUID();

for(let i=0;i<9;i++){
const td=document.createElement('td');
td.contentEditable=currentRole==='admin';
td.innerText=row[i]||'';
td.onblur=()=>saveRow(tr,tableId,id);
tr.appendChild(td);
}

const actionTd=document.createElement('td');

const del=document.createElement('button');
del.textContent='删除';
del.className='del';
del.disabled=currentRole!=='admin';
del.onclick=()=>deleteRow(tr,tableId,id);

actionTd.appendChild(del);
tr.appendChild(actionTd);

tbody.appendChild(tr);
}

async function addNewRow(tableId){
const values=['','','','','','','','','',generateUUID()];
const result=await sendToSheet('add',SHEET_MAP[tableId],null,values);

if(result.success){
createRow(tableId,values);
showToast('新增成功');
}
}

async function saveRow(tr,tableId,id){
const values=[...tr.children].slice(0,9).map(td=>td.innerText.trim());
values.push(id);

const result=await sendToSheet('save',SHEET_MAP[tableId],id,values);

if(result.success){
showToast('保存成功');
}
}

async function deleteRow(tr,tableId,id){
const result=await sendToSheet('delete',SHEET_MAP[tableId],id);

if(result.success){
tr.remove();
showToast('删除成功');
}
}

loginBtn.onclick=login;
logoutBtn.onclick=logout;

addMaintainBtn.onclick=()=>addNewRow('maintainTable');
addInspectBtn.onclick=()=>addNewRow('inspectTable');

window.onload=()=>{
applyPermission();
loadAllData();
};
</script>

</body>
</html>
